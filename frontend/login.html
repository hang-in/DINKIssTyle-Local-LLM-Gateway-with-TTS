<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DKST LLM Chat</title>

    <!-- Fonts -->
    <link rel="preload" href="vendor/fonts/inter-400-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="vendor/fonts/inter-500-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="vendor/fonts/inter-600-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="vendor/fonts/material-icons-round.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="fonts.css?v=1">
    <link rel="stylesheet" href="icons.css?v=2">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #79b8ff;
            --error-color: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .refresh-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 6px;
        }

        .refresh-btn:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .refresh-btn svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .cert-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            width: 100%;
            transition: color 0.2s;
        }

        .cert-btn:hover {
            color: var(--text-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .material-icons-round {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .login-header p {
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .status-banner {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            border: 1px solid transparent;
        }

        .status-banner.show {
            display: block;
        }

        .status-banner.offline {
            background: rgba(248, 81, 73, 0.12);
            border-color: rgba(248, 81, 73, 0.28);
            color: #ffb3ad;
        }

        .status-banner.info {
            background: rgba(88, 166, 255, 0.12);
            border-color: rgba(88, 166, 255, 0.24);
            color: #c6e2ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <button class="refresh-btn" onclick="window.location.reload(true)" title="새로고침(PWA, 캐시 등등)">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor"
                    d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5a5 5 0 0 1-8.66 3.54l-1.42 1.42A7 7 0 1 0 19 13c0-3.87-3.13-7-7-7Zm-5 5a5 5 0 0 1 8.66-3.54l1.42-1.42A7 7 0 1 0 5 11h2Z" />
            </svg>
        </button>

        <div class="login-header">
            <img src="appicon.png" alt="App Icon" style="width: 48px; height: 48px; margin-bottom: 15px;">
            <h1>DKST LLM Chat Server</h1>
            <p>Sign in to continue</p>
            <div id="status-banner" class="status-banner" role="status" aria-live="polite"></div>
        </div>

        <div id="auth-container" style="display: none; text-align: center;">
            <div style="margin-bottom: 20px;">
                <span class="material-icons-round"
                    style="font-size: 64px; color: var(--accent-color);">account_circle</span>
                <h2 id="auth-user" style="margin-top: 10px; font-weight: 500;">User</h2>
                <p style="color: var(--text-secondary); font-size: 14px;">You are already logged in</p>
            </div>

            <button class="login-btn" onclick="continueToChat()" style="margin-bottom: 12px;">Continue</button>

            <button class="login-btn" onclick="handleLogout()"
                style="background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-secondary);">
                Logout
            </button>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" style="display: none;" autocapitalize="off"
            autocorrect="off" spellcheck="false">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autocapitalize="off"
                    autocorrect="off" spellcheck="false" inputmode="text">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    autocapitalize="off" autocorrect="off" spellcheck="false">
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="remember-me" style="width: auto;">
                <label for="remember-me" style="margin: 0; font-weight: 400; cursor: pointer;">Remember me</label>
            </div>

            <div class="error-message" id="error-message"></div>

            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>

        <a href="/api/cert/download" class="cert-btn" download>
            <span style="font-size: 16px;">🔐</span> Download CA Certificate
        </a>

        <div class="footer">
            &copy; 2026 DINKI'ssTyle
        </div>
    </div>

    <script src="haptics.js"></script>
    <script>
        const authContainer = document.getElementById('auth-container');
        const loginForm = document.getElementById('login-form');
        const statusBanner = document.getElementById('status-banner');
        const loginSubtitle = document.querySelector('.login-header p');
        const certBtn = document.querySelector('.cert-btn');

        function triggerHaptic(type) {
            window.DKSTHaptics?.trigger(type);
        }

        function continueToChat() {
            triggerHaptic('success');
            window.location.href = '/';
        }

        function setBanner(message = '', kind = 'info') {
            statusBanner.textContent = message;
            statusBanner.className = `status-banner ${kind}`;
            if (message) {
                statusBanner.classList.add('show');
            }
        }

        function showOfflineState() {
            authContainer.style.display = 'none';
            loginForm.style.display = 'none';
            loginSubtitle.textContent = 'Offline';
            setBanner('현재 오프라인입니다. 서버에 다시 연결되면 로그인할 수 있습니다.', 'offline');
            if (certBtn) certBtn.classList.add('hidden');
        }

        function showLoginState() {
            authContainer.style.display = 'none';
            loginForm.style.display = 'block';
            loginSubtitle.textContent = 'Sign in to continue';
            setBanner('', 'info');
            if (certBtn) certBtn.classList.remove('hidden');
        }

        function showAuthenticatedState(userID) {
            document.getElementById('auth-user').textContent = userID;
            authContainer.style.display = 'block';
            loginForm.style.display = 'none';
            loginSubtitle.textContent = 'Signed in';
            setBanner('', 'info');
            if (certBtn) certBtn.classList.remove('hidden');
        }

        async function fetchJSONWithTimeout(url, options = {}, timeoutMs = 2500) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                return response;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();

            if (!navigator.onLine) {
                showOfflineState();
                return;
            }

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-message');

            btn.disabled = true;
            errorEl.classList.remove('show');

            try {
                const response = await fetchJSONWithTimeout('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: username,
                        password: password,
                        remember_me: rememberMe
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    triggerHaptic('success');
                    if (data.token) {
                        localStorage.setItem('sessionToken', data.token);
                    }
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                    } else {
                        localStorage.removeItem('savedUsername');
                    }
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                showOfflineState();
            } finally {
                btn.disabled = false;
            }
        }

        async function handleLogout() {
            try {
                const token = localStorage.getItem('sessionToken') || '';
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: token ? { Authorization: `Bearer ${token}` } : {}
                });
                localStorage.removeItem('sessionToken');
                authContainer.style.display = 'none';
                loginForm.style.display = 'block';
                document.getElementById('password').value = '';
                // Keep username if saved
            } catch (e) {
                console.error('Logout failed', e);
            }
        }

        async function refreshLoginState() {
            const savedUser = localStorage.getItem('savedUsername');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
                document.getElementById('remember-me').checked = true;
            }

            if (!navigator.onLine) {
                showOfflineState();
                return;
            }

            try {
                const token = localStorage.getItem('sessionToken') || '';
                const response = await fetchJSONWithTimeout('/api/auth/check', {
                    headers: token ? { Authorization: `Bearer ${token}` } : {}
                }, 2500);
                const data = await response.json();

                if (data.authenticated) {
                    showAuthenticatedState(data.user_id);
                } else {
                    localStorage.removeItem('sessionToken');
                    showLoginState();
                }
            } catch (e) {
                showOfflineState();
            }
        }

        // Check auth and setup UI
        window.addEventListener('online', refreshLoginState);
        window.addEventListener('offline', showOfflineState);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=5').catch(err => {
                    console.warn('Service worker registration failed:', err);
                });
            });
        }

        refreshLoginState();
    </script>
</body>

</html>
